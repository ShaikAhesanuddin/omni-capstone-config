spring:
  elasticsearch:
    uris: http://localhost:9200

logstash:
  host: localhost

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.web: INFO

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0 
      
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
