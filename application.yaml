spring:
  elasticsearch:
    uris: http://elasticsearch:9200

eureka:
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0 

  zipkin:
    endpoint: http://zipkin:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: health, info, prometheus

  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
